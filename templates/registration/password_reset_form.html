{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mot de passe oublié - Aquadémie Paris Plongée</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="icon" type="image/jpeg" href="{% static 'logo.jpeg' %}">
    <style>
        body { background: #f5f7fa; }
        .reset-container {
            max-width: 700px;
            margin: 48px auto 0 auto;
            background: #fff;
            border-radius: 18px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            padding: 2.5rem;
        }
        .reset-logo {
            height: 90px;
            width: auto;
            margin-bottom: 1rem;
        }
        .reset-title {
            font-size: 2.1rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="text-center mt-5 mb-4">
        <img src="{% static 'logo.jpeg' %}" alt="Logo" class="reset-logo">
        <div class="reset-title">Aquadémie Paris Plongée</div>
    </div>
    <div class="reset-container">
        <h3 class="mb-3">Mot de passe oublié</h3>
        <p class="text-muted mb-4">Saisissez votre adresse email. Si elle existe dans le système, vous recevrez un lien pour définir un nouveau mot de passe.</p>
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label for="id_email" class="form-label">Adresse email</label>
                {{ form.email }}
            </div>
            <button type="submit" class="btn btn-primary w-100">Envoyer le lien de réinitialisation</button>
        </form>
        <div class="mt-3 text-center">
            <a href="{% url 'login' %}" class="text-decoration-none">Retour à la connexion</a>
        </div>
    </div>
</div>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        var emailField = document.getElementById('id_email');
        if (emailField) {
            emailField.classList.add('form-control');
            emailField.placeholder = 'nom@exemple.com';
        }
    });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
